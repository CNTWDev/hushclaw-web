{% extends "base.html" %}
{% block title %}管理员登录 — Hushclaw{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-3">🦀</div>
      <h1 class="text-2xl font-bold">管理员登录</h1>
      <p class="text-gray-400 text-sm mt-1">Hushclaw Admin</p>
    </div>
    <div class="bg-navy-800 border border-navy-600 rounded-xl p-6">
      {% if error %}
      <div class="bg-red-900/30 border border-red-700 text-red-400 text-sm px-4 py-3 rounded-lg mb-4">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">密码</label>
          <input
            type="password"
            name="password"
            required
            autofocus
            class="w-full bg-navy-900 border border-navy-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-teal-500 transition-colors"
            placeholder="输入管理密码"
          />
        </div>
        <button type="submit" class="w-full bg-teal-500 hover:bg-teal-400 text-white font-semibold py-2.5 rounded-lg transition-colors">
          登录
        </button>
      </form>
    </div>
    <p class="text-center text-gray-600 text-xs mt-4">
      <a href="/" class="hover:text-gray-400 transition-colors">← 返回首页</a>
    </p>
  </div>
</div>
{% endblock %}
